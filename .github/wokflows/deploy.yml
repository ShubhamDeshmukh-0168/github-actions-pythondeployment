name: Deploy Python App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
      # till here we have setup the ssh key and added the host to known hosts on ubuntu agent
    - name: Deploy to EC2
      run: |
        ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
          cd /home/ubuntu/app || git clone https://github.com/your-username/your-repo.git /home/ubuntu/app
          cd /home/ubuntu/app
          git pull origin main
          pip3 install -r requirements.txt
          pkill -f app.py || true
          nohup python3 app.py > output.log 2>&1 &
        EOF
